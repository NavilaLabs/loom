[application]
name = "loom"
default_platform = "web"

[web.app]
title = "Loom"

[web.watcher]
reload_html = true

[web.resource]
script = []

[web.resource.dev]
script = []

[serve]
port = 8080
addr = "0.0.0.0"

[bundle]
identifier = "com.navilalabs.loom"
publisher = "NavilaLabs UG (haftungsbeschränkt)"
copyright = "Copyright © 2025 NavilaLabs UG (haftungsbeschränkt). All rights reserved."
category = "Business"
short_description = "Time tracking and project management."
long_description = """
Loom is a self-hosted time tracking and project management tool for teams.
Track time against customers, projects, and activities; manage timesheets;
and get an overview of your team's work in one place.
"""
icon = ["packages/ui/assets/favicon.svg"]

[bundle.macos]
minimum_system_version = "13.0"

[bundle.windows]
allow_downgrades = true
# webview_install_mode = { type = "DownloadBootstrapper", silent = true }
