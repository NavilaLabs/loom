[package]
name = "ui"
version = "0.1.0"
edition = "2021"

[dependencies]
api = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
dioxus = { workspace = true }
loom-core = { workspace = true }
statig = { workspace = true }
validator = { workspace = true }
dioxus-primitives = { git = "https://github.com/DioxusLabs/components", default-features = false, features = ["router", "web"], version = "0.0.1" }
dioxus-free-icons = { workspace = true }
dioxus-i18n = { workspace = true }
unic-langid = { workspace = true }
dioxus-charts = "0.4.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-timers = { version = "0.3", features = ["futures"] }
js-sys = "0.3"

[features]
server = ["api/server"]
