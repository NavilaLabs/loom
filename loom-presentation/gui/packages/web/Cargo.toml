[package]
name = "web"
version = "0.1.0"
edition = "2021"

[dependencies]
api = { workspace = true }
axum = {version="0.8", optional = true}
dioxus = { workspace = true, features = ["router", "fullstack"] }
dioxus-motion = { git = "https://github.com/wheregmis/dioxus-motion.git", branch = "main", features = ["web", "transitions"] }
dotenvy = { workspace = true }
tokio = { version = "1", optional = true }
ui = { workspace = true }

[features]
# default = ["server"]
web = ["dioxus/web"]
server = ["dioxus/server", "axum", "api/server", "dep:tokio", "ui/server"]
