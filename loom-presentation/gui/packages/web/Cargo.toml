[package]
name = "web"
version = "0.1.0"
edition = "2021"

[dependencies]
api = { workspace = true }
axum = {version="0.8", optional = true}
loom = { path = "../../../../loom", optional = true }
convert_case = "0.11.0"
dioxus = { workspace = true, features = ["router", "fullstack"] }
dioxus-motion = { git = "https://github.com/wheregmis/dioxus-motion.git", branch = "main", features = ["web", "transitions"] }
dotenvy = { workspace = true }
easer = { version = "0.3.0", default-features = false }
tokio = { version = "1", optional = true }
tower-sessions = { version = "0.14", optional = true }
ui = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-timers = { version = "0.3", features = ["futures"] }
js-sys = "0.3"

[features]
# default = ["server"]
web = ["dioxus/web"]
server = ["dioxus/server", "axum", "api/server", "dep:loom", "loom/sqlite", "dep:tokio", "dep:tower-sessions", "ui/server"]
